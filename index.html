<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Unit Converter</title>
        <link href="css/styles.css" rel="stylesheet"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <section class="container">
            <header>
                <h1>Metric/Imperial Unit Conversion</h1>
            </header>
            <div class="num">20</div>
            <button id="convert-btn">Convert</button>
        </section>
        <section class="conversion">
            <div id="length" class="background">
                <h2>Length (Meter/Feet)</h2>
                <p id="length-result">20 Meters = 65.62 Feet | 65.62 Feet = 20 Meters</p>
            </div>
            <div id="volume" class="background">
                <h2>Volume (Liters/Gallons)</h2>
                <p id="volume-result">20 Liters = 5.28 Gallons | 5.28 Gallons = 20 Liters</p>
            </div>
            <div id="mass" class="background">
                <h2>Mass (Kilograms/Pounds)</h2>
                <p id="mass-result">20 Kilograms = 44.09 Pounds | 44.09 Pounds = 20 Kilograms</p>   
            </div>
        </section>
        <script src="js/index.js"></script>
    </body>
</html>
